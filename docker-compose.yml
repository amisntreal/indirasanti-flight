version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: indirasanti_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=indirasanti_flight
      - DB_USERNAME=indirasanti
      - DB_PASSWORD=secret
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - APP_URL=http://localhost
      - MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY}
      - MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY}
    depends_on:
      - mysql
    networks:
      - indirasanti_network

  nginx:
    image: nginx:alpine
    container_name: indirasanti_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - indirasanti_network

  mysql:
    image: mysql:8.0
    container_name: indirasanti_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: indirasanti_flight
      MYSQL_USER: indirasanti
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - indirasanti_network

networks:
  indirasanti_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
